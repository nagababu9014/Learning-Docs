<!DOCTYPE html>
<html>
<head>
    <title>PDF → Audio Player</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        .player-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .download-btn {
            margin-top: 10px;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5 p-4 bg-white rounded shadow">

    <h3 class="mb-3">Convert PDF to Audio (Podcast)</h3>

    <!-- Upload Form -->
    <form id="pdfForm">
        <input type="file" name="pdf" id="pdf" class="form-control"
               accept="application/pdf" required>

        <button class="btn btn-primary w-100 mt-3">Convert to Audio 🎧</button>
    </form>

    <!-- Player Section -->
    <div id="playerSection" class="player-box" style="display:none;">
        <h5>🎧 Your Podcast is Ready</h5>

        <!-- Audio Player -->
        <audio id="audioPlayer" controls style="width:100%; margin-top:10px;">
            Your browser does not support audio playback.
        </audio>

        <!-- Speed Control -->
        <label class="mt-3">Playback Speed:</label>
        <select id="speedControl" class="form-select w-25">
            <option value="0.5">0.5x (Slow)</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x (Normal)</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x (Fast)</option>
        </select>

        <!-- Download Button -->
        <a id="downloadBtn"
           class="btn btn-success w-100 download-btn"
           href="#"
           download>
           ⬇️ Download Audio (MP3)
        </a>

    </div>

</div>

<script>
document.getElementById("pdfForm").onsubmit = async (e) => {
    e.preventDefault();

    let formData = new FormData();
    formData.append("pdf", document.getElementById("pdf").files[0]);

    let res = await fetch("/pdf-to-audio", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    // Show player UI
    document.getElementById("playerSection").style.display = "block";

    // Set audio source
    document.getElementById("audioPlayer").src = data.audio_url;

    // Set download link
    document.getElementById("downloadBtn").href = data.audio_url;

    console.log("Audio URL:", data.audio_url);
};

// Speed Control
document.getElementById("speedControl").onchange = (e) => {
    document.getElementById("audioPlayer").playbackRate = e.target.value;
};
</script>

</body>
</html>
